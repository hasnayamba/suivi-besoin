<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - Swisscontact </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --swiss-blue: #0056b3;
            --swiss-blue-light: #007bff;
            --swiss-gray-dark: #495057;
            --swiss-gray: #6c757d;
            --swiss-gray-light: #e9ecef;
            --swiss-white: #ffffff;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--swiss-gray-light) 0%, var(--swiss-white) 50%, var(--swiss-gray-light) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .welcome-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .welcome-card {
            background: var(--swiss-white);
            border: 1px solid var(--swiss-gray-light);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 86, 179, 0.1);
            overflow: hidden;
            width: 100%;
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--swiss-blue) 0%, var(--swiss-blue-light) 100%);
            color: var(--swiss-white);
            padding: 2rem 1.5rem;
            border-bottom: none;
            text-align: center;
        }
        
        .swiss-logo {
            font-weight: 700;
            font-size: clamp(1.5rem, 4vw, 1.8rem);
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }
        
        .logo-icon {
            font-size: clamp(2.5rem, 8vw, 3rem);
            color: var(--swiss-white);
            margin-bottom: 1rem;
            opacity: 0.9;
        }
        
        .feature-badge {
            background: var(--swiss-gray-light);
            color: var(--swiss-gray-dark);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: clamp(0.75rem, 2vw, 0.85rem);
            font-weight: 500;
            margin: 0.2rem;
            border: 1px solid #dee2e6;
            display: inline-block;
            white-space: nowrap;
        }
        
        .btn-swiss {
            background: var(--swiss-blue);
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: clamp(1rem, 3vw, 1.1rem);
            transition: all 0.3s ease;
            color: white;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }
        
        .btn-swiss:hover {
            background: var(--swiss-blue-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 86, 179, 0.3);
            color: white;
        }
        
        .security-badge {
            color: var(--swiss-gray);
            font-size: clamp(0.8rem, 2vw, 0.9rem);
        }
        
        .swiss-subtitle {
            color: var(--swiss-gray-dark);
            font-weight: 500;
            font-size: clamp(1rem, 3vw, 1.1rem);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card-body {
            padding: clamp(1.5rem, 4vw, 2.5rem);
        }
        
        .lead {
            color: var(--swiss-gray);
            line-height: 1.6;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .welcome-container {
                padding: 15px;
            }
            
            .card-header {
                padding: 1.5rem 1rem;
            }
            
            .card-body {
                padding: 1.5rem 1rem;
            }
            
            .feature-badge {
                padding: 0.4rem 0.8rem;
                margin: 0.1rem;
                display: inline-block;
            }
            
            .btn-swiss {
                padding: 0.8rem 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            body, html {
                align-items: flex-start;
                padding-top: 20px;
            }
            
            .welcome-container {
                padding: 10px;
            }
            
            .card-header {
                padding: 1.2rem 0.8rem;
            }
            
            .feature-badges-container {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                align-items: center;
            }
            
            .feature-badge {
                width: auto;
                min-width: 160px;
            }
            
            .btn-swiss {
                max-width: 100%;
            }
        }
        
        @media (max-width: 360px) {
            .welcome-container {
                padding: 5px;
            }
            
            .card-header {
                padding: 1rem 0.5rem;
            }
            
            .card-body {
                padding: 1rem 0.5rem;
            }
            
            .swiss-logo {
                font-size: 1.3rem;
            }
            
            .logo-icon {
                font-size: 2rem;
            }
        }
        
        /* Pour les très grands écrans */
        @media (min-width: 1400px) {
            .welcome-container {
                max-width: 700px;
            }
            
            .card-header {
                padding: 3rem 2rem;
            }
            
            .card-body {
                padding: 3rem;
            }
        }
        
        /* Empêcher le zoom sur les champs input sur iOS */
        @media (max-width: 768px) {
            input, select, textarea {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <div class="card welcome-card">
            <div class="card-header">
               
                <div class="swiss-logo">SWISSCONTACT</div>
                
                <p class="mb-0 opacity-90 mt-2">Plateforme de Gestion </p>
            </div>
            
            <div class="card-body">
                <div class="mb-4 text-center feature-badges-container">
                    <span class="feature-badge">📊 Suivi des Marchés</span>
                    <span class="feature-badge">📝 Gestion des Contrats</span>
                    <span class="feature-badge">🤝 Conventions</span>
                </div>
                
                <p class="card-text lead text-center mb-4">
                    Solution intégrée de suivi et gestion de vos marchés, contrats et conventions 
                    dans un environnement sécurisé et professionnel.
                </p>
                
                <div class="d-grid gap-2">
                    <a href="login.php" class="btn btn-swiss">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Accéder à la plateforme
                    </a>
                </div>
                
                <div class="mt-4 text-center security-badge">
                    <i class="bi bi-shield-check me-1"></i>
                    Environnement sécurisé • 
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
